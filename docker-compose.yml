version: '2.4'

services:
  common: &common
    build:
      context: .
      dockerfile: ./.dockerdev/Dockerfile.dev
      args:
        RUBY_VERSION: '3.0.5'
        NODE_VERSION: '18'
        YARN_VERSION: '1.22.19'
    image: stimulus-form:1.0.0
    volumes:
      - .:/app:cached
    tmpfs:
      - /tmp

  app: &app
    <<: *common
    stdin_open: true
    tty: true
